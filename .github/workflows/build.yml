name: build

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-windows:
    name: build-windows-x64-release
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Check build tools
        shell: pwsh
        run: |
          cmake --version

          if (-not (Get-Command ninja -ErrorAction SilentlyContinue)) {
            choco install ninja -y --no-progress
          }

          ninja --version

      - name: Download Skia m124
        shell: pwsh
        run: |
          $url = "https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip"

          curl.exe -fL $url -o skia.zip

          if (-not (Test-Path skia.zip)) {
            throw "skia.zip was not downloaded."
          }

          $size = (Get-Item skia.zip).Length
          Write-Host "Downloaded skia.zip size: $size bytes"

          if ($size -lt 1000000) {
            throw "Skia download failed or file is too small."
          }

          Expand-Archive -Path skia.zip -DestinationPath skia -Force

          Write-Host "Skia directory:"
          Get-ChildItem -Recurse skia | Select-Object FullName

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DENABLE_UI=on `
            -DENABLE_CCACHE=off `
            -DLAF_BACKEND=skia `
            -DSKIA_DIR="$env:GITHUB_WORKSPACE\skia" `
            -DSKIA_LIBRARY_DIR="$env:GITHUB_WORKSPACE\skia\out\Release-x64" `
            -DSKIA_LIBRARY="$env:GITHUB_WORKSPACE\skia\out\Release-x64\skia.lib"

      - name: Compile
        shell: pwsh
        run: |
          cmake --build build --target aseprite --config Release

      - name: Copy runtime DLLs from PATH if present
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\bin | Out-Null

          $patterns = @(
            "libcrypto-1_1-x64.dll",
            "libssl-1_1-x64.dll",
            "libcrypto-3-x64.dll",
            "libssl-3-x64.dll"
          )

          foreach ($name in $patterns) {
            $found = where.exe $name 2>$null

            foreach ($file in $found) {
              if (Test-Path $file) {
                Copy-Item $file build\bin -Force
                Write-Host "Copied $file"
              }
            }
          }

          Write-Host "Final build/bin contents:"
          Get-ChildItem build\bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aseprite-windows-x64
          path: build/bin/**
          if-no-files-found: error
